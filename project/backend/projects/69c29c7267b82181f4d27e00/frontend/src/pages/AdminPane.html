<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Library Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.3/css/all.css" rel="stylesheet">
</head>
<body class="h-screen bg-gray-100">
    <header class="bg-blue-500 text-white p-4 flex justify-between">
        <h1 class="text-2xl font-bold">Online Library Admin Dashboard</h1>
        <nav>
            <ul class="flex items-center space-x-4">
                <li><a href="#" class="hover:text-gray-300">Home</a></li>
                <li><a href="#" class="hover:text-gray-300">Books</a></li>
                <li><a href="#" class="hover:text-gray-300">Users</a></li>
            </ul>
        </nav>
    </header>
    <main class="p-4 flex flex-col h-screen">
        <section class="flex justify-between mb-4">
            <div class="bg-white p-4 rounded shadow-md w-1/3">
                <h2 class="text-lg font-bold mb-2">Total Books</h2>
                <p id="total-books" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-white p-4 rounded shadow-md w-1/3">
                <h2 class="text-lg font-bold mb-2">Total Users</h2>
                <p id="total-users" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-white p-4 rounded shadow-md w-1/3">
                <h2 class="text-lg font-bold mb-2">Total Borrowed Books</h2>
                <p id="total-borrowed-books" class="text-2xl font-bold">0</p>
            </div>
        </section>
        <section class="flex-1 overflow-y-auto">
            <table class="w-full table-auto border-collapse border border-gray-300">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="border border-gray-300 p-2">Book Title</th>
                        <th class="border border-gray-300 p-2">Author</th>
                        <th class="border border-gray-300 p-2">Status</th>
                        <th class="border border-gray-300 p-2">Actions</th>
                    </tr>
                </thead>
                <tbody id="book-list">
                </tbody>
            </table>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.min.js"></script>
    <script>
        const totalBooksElement = document.getElementById('total-books');
        const totalUsersElement = document.getElementById('total-users');
        const totalBorrowedBooksElement = document.getElementById('total-borrowed-books');
        const bookListElement = document.getElementById('book-list');

        const fetchStatistics = async () => {
            try {
                const response = await fetch('statistics.php');
                const data = await response.json();
                totalBooksElement.textContent = data.totalBooks;
                totalUsersElement.textContent = data.totalUsers;
                totalBorrowedBooksElement.textContent = data.totalBorrowedBooks;
            } catch (error) {
                console.error(error);
            }
        };

        const fetchBookList = async () => {
            try {
                const response = await fetch('book-list.php');
                const data = await response.json();
                bookListElement.innerHTML = '';
                data.forEach(book => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="border border-gray-300 p-2">${book.title}</td>
                        <td class="border border-gray-300 p-2">${book.author}</td>
                        <td class="border border-gray-300 p-2">${book.status}</td>
                        <td class="border border-gray-300 p-2">
                            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                                Edit
                            </button>
                            <button class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                                Delete
                            </button>
                        </td>
                    `;
                    bookListElement.appendChild(row);
                });
            } catch (error) {
                console.error(error);
            }
        };

        fetchStatistics();
        fetchBookList();
    </script>
</body>
</html>
